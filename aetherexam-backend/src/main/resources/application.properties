# Web Based Automated Examination System Configuration

# Database Configuration (Persistent H2)
spring.datasource.url=jdbc:h2:file:./data/zenithdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Auto-create tables
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
zenith.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
zenith.jwt.expiration=86400000

# Server Port
server.port=8080
